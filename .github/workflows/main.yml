name: Robô da Madrugada LCK

on:
  schedule:
    # Roda todo dia às 07:00 UTC (04:00 da manhã no Brasil)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Botão manual

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: 🥷 O Trator (Download Nativo via WGET)
        run: |
          wget -O 2025_LoL_esports_match_data_from_OraclesElixir.csv --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" --header="Referer: https://oracleselixir.com/" "https://oracleselixir-downloadable-files.s3-us-west-2.amazonaws.com/2025_LoL_esports_match_data_from_OraclesElixir.csv"
          wget -O 2026_LoL_esports_match_data_from_OraclesElixir.csv --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" --header="Referer: https://oracleselixir.com/" "https://oracleselixir-downloadable-files.s3-us-west-2.amazonaws.com/2026_LoL_esports_match_data_from_OraclesElixir.csv"

      - name: Salvar mudancas no GitHub
        run: |
          git config --global user.name 'Robo-Predictor'
          git config --global user.email 'bot@github.com'
          git add *.csv
          git diff-index --quiet HEAD || git commit -m "🤖 Dados atualizados com sucesso via WGET!"
          git push